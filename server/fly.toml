# fly.toml app configuration file generated for tobuy2 on 2026-04-06T08:38:45+10:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'tobuy2'
primary_region = 'syd'

[[services]]
  internal_port = 8080
  protocol = "tcp"

  [services.concurrency]
    hard_limit = 25
    soft_limit = 20

  [[services.ports]]
    handlers = ["http"]
    port = "80"

  [[services.ports]]
    handlers = ["tls", "http"]
    port = "443"

  [[services.tcp_checks]]
    interval = 10000
    timeout = 2000

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
